<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB UID LIVE CHECKER - COLOR FIXED</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড এবং বডি স্টাইল */
        body { 
            background-color: #0d1117; /* ডার্ক ব্লু-ব্ল্যাক ব্যাকগ্রাউন্ড */
            color: #c9d1d9; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background-color: #161b22; /* কার্ড ব্যাকগ্রাউন্ড */
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; }

        /* টেক্সট এরিয়া কালার */
        textarea {
            width: 100%;
            height: 150px;
            background-color: #010409;
            color: #39ff14; /* নিয়ন গ্রিন টেক্সট */
            border: 1px solid #30363d;
            border-radius: 5px;
            padding: 10px;
            font-family: monospace;
            outline: none;
        }

        /* বাটন কালার */
        .btn-check {
            background-color: #238636; /* সবুজ বাটন */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn-check:hover { background-color: #2ea043; }

        /* রেজাল্ট সেকশন কালার */
        #resultBox {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid #30363d;
            padding-top: 10px;
        }

        .live { 
            color: #2ecc71; /* একদম উজ্জ্বল সবুজ */
            font-weight: bold;
            background: rgba(46, 204, 113, 0.1);
            padding: 5px;
            margin: 2px 0;
            border-radius: 3px;
        }

        .dead { 
            color: #e74c3c; /* একদম উজ্জ্বল লাল */
            font-weight: bold;
            background: rgba(231, 76, 60, 0.1);
            padding: 5px;
            margin: 2px 0;
            border-radius: 3px;
        }

        /* প্রগ্রেস বার */
        .progress-container {
            width: 100%;
            background-color: #30363d;
            border-radius: 10px;
            margin: 15px 0;
        }
        #progressBar {
            width: 0%;
            height: 10px;
            background-color: #58a6ff; /* ব্লু প্রগ্রেস */
            border-radius: 10px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FB UID LIVE CHECKER</h2>
    <textarea id="uids" placeholder="এখানে UID পেস্ট করুন (প্রতি লাইনে একটি)..."></textarea>
    <button class="btn-check" onclick="startChecking()">CHECK START</button>
    
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div id="resultBox"></div>
</div>

<script>
    async function startChecking() {
        const textArea = document.getElementById('uids');
        const resultBox = document.getElementById('resultBox');
        const progressBar = document.getElementById('progressBar');
        
        const lines = textArea.value.split('\n').filter(line => line.trim() !== "");
        resultBox.innerHTML = "";
        
        for(let i=0; i<lines.length; i++) {
            let uid = lines[i].trim();
            
            // কাজের লজিক
            try {
                const response = await fetch(`https://graph.facebook.com/${uid}/picture?type=normal`);
                
                const div = document.createElement('div');
                if (response.ok && response.url.includes('100x100')) {
                    div.className = 'live';
                    div.innerHTML = `ID: ${uid} -> LIVE ✅`;
                } else {
                    div.className = 'dead';
                    div.innerHTML = `ID: ${uid} -> DEAD ❌`;
                }
                resultBox.appendChild(div);
            } catch (e) {
                console.log("Error checking " + uid);
            }

            // প্রগ্রেস আপডেট
            let percent = ((i + 1) / lines.length) * 100;
            progressBar.style.width = percent + "%";
        }
    }
</script>

</body>
</html>
