<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB & IG OTP Extractor - Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Chaker প্রজেক্টের মতো প্রিমিয়াম গ্লোয়িং এবং গ্লাস ইফেক্ট */
        .neon-card {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(51, 65, 85, 0.5);
            box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.7), 0 0 30px rgba(99, 102, 241, 0.05);
            border-radius: 28px;
        }
        .inner-neon-box {
            background: rgba(9, 15, 29, 0.7);
            border: 1px solid rgba(51, 65, 85, 0.3);
            border-radius: 16px;
        }
        /* আপনার পিকের সেই সিগনেচার কার্ভ ব্র্যাকেট ডিজাইন (ডার্ক মোড এডিশন) */
        .neon-bracket {
            border-left: 3px solid #6366f1;
            border-right: 3px solid #6366f1;
            border-radius: 14px;
            box-shadow: inset 10px 0 15px -10px rgba(99, 102, 241, 0.1), inset -10px 0 15px -10px rgba(99, 102, 241, 0.1);
        }
        /* কাস্টম স্ক্রলবার */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        textarea::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-[#030712] text-slate-200 min-h-screen flex flex-col justify-center items-center p-6 font-sans select-none">

    <div class="w-full max-w-lg neon-card p-8 min-h-[840px] flex flex-col justify-between transition-all duration-300">
        
        <div>
            <div class="flex flex-col items-center mb-6">
                <div class="flex items-center space-x-3 text-3xl font-black tracking-tight">
                    <i class="fas fa-cube text-indigo-500 animate-pulse text-2xl"></i>
                    <h1 class="text-2xl font-black bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent">FB & IG OTP Extractor</h1>
                </div>
                <p class="text-[11px] text-indigo-400/70 font-bold uppercase tracking-widest mt-1">Cloud Automation Hub</p>
                
                <div id="modeBadge" class="mt-3 inline-flex items-center space-x-1.5 bg-amber-500/10 border border-amber-500/30 px-5 py-1 rounded-full shadow-sm">
                    <i class="fas fa-shield-alt text-amber-400 text-[10px]"></i>
                    <span id="badgeText" class="text-[10px] font-black text-amber-400 tracking-wider uppercase">Facebook Priority Mode</span>
                </div>
            </div>

            <div class="mb-5 bg-slate-950 p-1.5 rounded-2xl flex space-x-1.5 border border-slate-800/80">
                <button onclick="setPlatform('fb')" id="fbBtn" class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xs font-black py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-300 shadow-lg shadow-blue-900/30 cursor-pointer">
                    <i class="fab fa-facebook mr-2 text-sm"></i> Facebook
                    <span class="ml-1.5 bg-amber-400 text-slate-950 text-[9px] font-black px-1.5 py-0.5 rounded-md shadow-xs">1st</span>
                </button>
                <button onclick="setPlatform('ig')" id="igBtn" class="flex-1 bg-transparent text-slate-500 hover:text-slate-300 text-xs font-bold py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-300 cursor-pointer">
                    <i class="fab fa-instagram mr-2 text-sm"></i> Instagram
                    <span class="ml-1.5 bg-slate-800 text-slate-400 text-[9px] font-bold px-1.5 py-0.5 rounded-md">2nd</span>
                </button>
            </div>

            <div class="mb-5 flex space-x-2">
                <button onclick="loadAccount(1)" class="flex-1 bg-slate-900/60 hover:bg-slate-800/80 text-slate-400 hover:text-white text-xs font-bold py-2.5 px-3 rounded-xl border border-slate-800 transition cursor-pointer flex justify-center items-center shadow-xs">
                    <i class="fas fa-user-shield mr-1.5 text-blue-400"></i> Account 1
                </button>
                <button onclick="loadAccount(2)" class="flex-1 bg-slate-900/60 hover:bg-slate-800/80 text-slate-400 hover:text-white text-xs font-bold py-2.5 px-3 rounded-xl border border-slate-800 transition cursor-pointer flex justify-center items-center shadow-xs">
                    <i class="fas fa-user-shield mr-1.5 text-purple-400"></i> Account 2
                </button>
            </div>

            <div id="inputBracket" class="mb-5 relative px-4 neon-bracket">
                <label class="block text-[11px] font-black text-indigo-300 tracking-wider mb-2 uppercase flex items-center">
                    <i class="fas fa-terminal mr-1.5 text-indigo-400"></i> Input Account Data Line:
                </label>
                <textarea 
                    id="rawData" 
                    class="w-full h-24 bg-slate-950/80 border border-slate-800 rounded-xl p-3 text-xs font-mono text-cyan-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-inner transition"
                    placeholder="email|password|refresh_token|client_id"
                ></textarea>
            </div>

            <div class="flex space-x-2 mb-6">
                <button onclick="getOtpCode()" id="actionBtn" class="flex-[2] bg-slate-900 hover:bg-slate-800 text-slate-300 font-black py-3.5 px-4 rounded-xl border border-slate-800 transition-all duration-200 flex justify-center items-center cursor-pointer text-xs tracking-wider uppercase shadow-md">
                    <span id="btnText"><i class="fas fa-bolt mr-2 text-indigo-400"></i> Extract OTP Code</span>
                </button>
                <button onclick="clearAll()" class="flex-1 bg-slate-900/40 hover:bg-slate-900 text-slate-500 hover:text-red-400 font-bold py-3.5 px-4 rounded-xl border border-slate-800/60 transition flex justify-center items-center cursor-pointer text-xs uppercase">
                    <i class="fas fa-eraser mr-1.5"></i> Clear
                </button>
            </div>
        </div>

        <div id="resultBox" class="border border-slate-800 rounded-2xl p-5 bg-slate-950/60 mt-auto">
            
            <div id="detectInfo" class="px-4 border-l-3 border-r-3 border-indigo-500 mb-4 flex justify-between items-center bg-slate-900/40 py-2.5 rounded-xl border border-slate-800/50 shadow-xs">
                <div class="max-w-[260px]">
                    <div class="flex items-center text-xs font-black text-indigo-300 tracking-wide">
                        <i id="statusDot" class="fas fa-circle-notch text-indigo-400 mr-1.5 text-xs"></i>
                        <span id="successMsg">System Standing By</span>
                    </div>
                    <div class="text-[11px] text-slate-500 mt-1 font-mono break-all">
                        Target: <span id="displayEmail" class="text-slate-400 font-bold">No Account Loaded</span>
                    </div>
                </div>
                <button onclick="copyEmail()" id="copyEmailBtn" class="bg-indigo-950/80 text-indigo-400 hover:bg-indigo-900 hover:text-indigo-200 border border-indigo-800/50 px-3 py-2 rounded-xl text-[11px] font-black transition cursor-pointer flex items-center shadow-md">
                    <i class="fas fa-copy mr-1 text-xs"></i> Copy Email
                </button>
            </div>

            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between shadow-inner">
                <div>
                    <span id="codeTitle" class="text-[9px] font-black text-slate-500 block mb-1 uppercase tracking-widest">Verification Code:</span>
                    <span id="otpOutput" class="text-4xl font-black tracking-widest text-slate-600 font-mono drop-shadow-[0_0_10px_rgba(74,222,128,0)] transition-all">XXXXXX</span>
                </div>
                <button onclick="copyCode()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-xs font-black transition-all cursor-pointer shadow-lg shadow-indigo-950/50 flex items-center border border-indigo-500/30">
                    <i class="fas fa-clone mr-1.5"></i> Copy Code
                </button>
            </div>
        </div>

    </div>

    <script>
        let currentPlatform = 'fb';

        // ⚠️ আপনার অ্যাকাউন্টের ডাটাগুলো এখানে সেট করে রাখতে পারেন
        const account1_data = "email1@outlook.com|pass1|refresh_token_1|client_id_1";
        const account2_data = "email2@outlook.com|pass2|refresh_token_2|client_id_2";

        document.getElementById('rawData').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            document.getElementById('displayEmail').innerText = val.includes('|') ? val.split('|')[0] : "No Account Loaded";
        });

        function setPlatform(platform) {
            currentPlatform = platform;
            const fbBtn = document.getElementById('fbBtn');
            const igBtn = document.getElementById('igBtn');
            const modeBadge = document.getElementById('modeBadge');
            const badgeText = document.getElementById('badgeText');
            const inputBracket = document.getElementById('inputBracket');

            if(platform === 'fb') {
                fbBtn.className = "flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xs font-black py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-300 shadow-lg shadow-blue-900/30 cursor-pointer";
                igBtn.className = "flex-1 bg-transparent text-slate-500 hover:text-slate-300 text-xs font-bold py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-300 cursor-pointer";
                
                modeBadge.className = "mt-3 inline-flex items-center space-x-1.5 bg-amber-500/10 border border-amber-500/30 px-5 py-1 rounded-full shadow-sm";
                badgeText.className = "text-[10px] font-black text-amber-400 tracking-wider uppercase";
                badgeText.innerText = "Facebook Priority Mode";
                inputBracket.style.borderColor = "#6366f1";
            } else {
                igBtn.className = "flex-1 bg-gradient-to-r from-purple-600 via-pink-500 to-orange-500 text-white text-xs font-black py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-300 shadow-lg shadow-pink-900/30 cursor-pointer";
                fbBtn.className = "flex-1 bg-transparent text-slate-500 hover:text-slate-300 text-xs font-bold py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-300 cursor-pointer";
                
                modeBadge.className = "mt-3 inline-flex items-center space-x-1.5 bg-pink-500/10 border border-pink-500/30 px-5 py-1 rounded-full shadow-sm";
                badgeText.className = "text-[10px] font-black text-pink-400 tracking-wider uppercase";
                badgeText.innerText = "Instagram Priority Mode";
                inputBracket.style.borderColor = "#ec4899";
            }
        }

        function loadAccount(num) {
            const data = num === 1 ? account1_data : account2_data;
            document.getElementById('rawData').value = data;
            document.getElementById('displayEmail').innerText = data.includes('|') ? data.split('|')[0] : "No Account Loaded";
        }

        function clearAll() {
            document.getElementById('rawData').value = "";
            document.getElementById('displayEmail').innerText = "No Account Loaded";
            document.getElementById('otpOutput').innerText = "XXXXXX";
            document.getElementById('otpOutput').className = "text-4xl font-black tracking-widest text-slate-600 font-mono";
            document.getElementById('successMsg').innerText = "System Standing By";
            document.getElementById('statusDot').className = "fas fa-circle-notch text-indigo-400 mr-1.5 text-xs";
            document.getElementById('detectInfo').style.borderColor = "#6366f1";
        }

        async function getOtpCode() {
            const rawInput = document.getElementById('rawData').value.trim();
            const actionBtn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            const otpOutput = document.getElementById('otpOutput');
            const successMsg = document.getElementById('successMsg');
            const statusDot = document.getElementById('statusDot');
            const detectInfo = document.getElementById('detectInfo');

            if(!rawInput) {
                alert('Please enter or select account data line!');
                return;
            }

            actionBtn.disabled = true;
            actionBtn.className = "flex-[2] bg-indigo-600 text-white font-black py-3.5 px-4 rounded-xl transition-all duration-200 flex justify-center items-center text-xs tracking-wider uppercase shadow-lg shadow-indigo-900/40";
            btnText.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Fetching Live OTP...';
            
            successMsg.innerText = "Connecting Mail API Cloud...";
            statusDot.className = "fas fa-circle-notch fa-spin mr-1.5 text-amber-400 text-xs";
            detectInfo.style.borderColor = "#f59e0b";
            otpOutput.innerText = "XXXXXX";
            otpOutput.className = "text-4xl font-black tracking-widest text-slate-700 font-mono";

            try {
                // ⚠️ আপনার Render লাইভ URL লিঙ্কটি নিচে বসাবেন
                const API_URL = "https://fb-code-api.onrender.com/get-code"; 

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_input: rawInput, mode: currentPlatform })
                });
                const data = await response.json();

                resetButton();

                if(data.status === 'success') {
                    successMsg.innerText = `${currentPlatform === 'fb' ? 'Facebook' : 'Instagram'} OTP Extracted`;
                    statusDot.className = "fas fa-check-circle mr-1.5 text-emerald-400 text-xs";
                    detectInfo.style.borderColor = "#10b981";
                    
                    otpOutput.innerText = data.code;
                    otpOutput.className = "text-4xl font-black tracking-widest text-emerald-400 font-mono drop-shadow-[0_0_12px_rgba(52,211,153,0.5)]";
                } else {
                    successMsg.innerText = "Session Rejected / No Code";
                    statusDot.className = "fas fa-times-circle mr-1.5 text-red-400 text-xs";
                    detectInfo.style.borderColor = "#ef4444";
                    otpOutput.innerText = "FAILED";
                    otpOutput.className = "text-xl font-black text-red-500 font-sans";
                }
            } catch (err) {
                resetButton();
                successMsg.innerText = "Server is Waking Up...";
                statusDot.className = "fas fa-exclamation-triangle mr-1.5 text-amber-400 text-xs";
                detectInfo.style.borderColor = "#f59e0b";
                otpOutput.innerText = "RETRY";
                otpOutput.className = "text-xl font-black text-amber-500 font-sans";
            }
        }

        function resetButton() {
            const actionBtn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            actionBtn.disabled = false;
            actionBtn.className = "flex-[2] bg-slate-900 hover:bg-slate-800 text-slate-300 font-black py-3.5 px-4 rounded-xl border border-slate-800 transition-all duration-200 flex justify-center items-center cursor-pointer text-xs tracking-wider uppercase shadow-md";
            btnText.innerHTML = '<i class="fas fa-bolt mr-2 text-indigo-400"></i> Extract OTP Code';
        }

        document.window
        function copyCode() {
            const text = document.getElementById('otpOutput').innerText;
            if(text && text !== 'XXXXXX' && text !== 'FAILED' && text !== 'RETRY') {
                navigator.clipboard.writeText(text);
                alert('Verification Code Copied to Clipboard!');
            }
        }

        function copyEmail() {
            const emailText = document.getElementById('displayEmail').innerText;
            if(emailText && emailText !== 'No Account Loaded') {
                navigator.clipboard.writeText(emailText);
                alert('Email Copied successfully!');
            } else {
                alert('No Email loaded to copy!');
            }
        }
    </script>
</body>
</html>
