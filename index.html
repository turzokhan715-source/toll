<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator - VIP Tool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: rgb(168, 85, 247);
            --bg: rgb(10, 11, 18);
            --card-bg: rgb(21, 23, 37);
            --text-gray: rgb(156, 163, 175);
            --btn-grad: linear-gradient(135deg, rgb(168, 85, 247), rgb(139, 92, 246));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg);
            color: rgb(255, 255, 255);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* Top Sub-Navigation for Tool */
        .tool-nav {
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .home-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgb(255, 255, 255);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .home-link:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .tool-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: rgb(30, 32, 50);
            color: var(--text-gray);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .tool-btn:hover {
            color: rgb(255, 255, 255);
            border-color: rgba(168, 85, 247, 0.4);
            background: rgba(168, 85, 247, 0.1);
        }

        /* Tool Container */
        .container {
            max-width: 600px;
            margin: 50px auto 0 auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .tool-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tool-header i {
            font-size: 44px;
            color: var(--primary);
            margin-bottom: 12px;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5));
        }

        .tool-header h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .tool-header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: rgb(255, 255, 255);
            font-size: 14px;
        }

        .input-box {
            width: 100%;
            padding: 14px;
            background: rgb(15, 17, 26);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: rgb(255, 255, 255);
            font-size: 14px;
            font-family: monospace;
            transition: all 0.3s;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--btn-grad);
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }

        /* Result Section */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgb(15, 17, 26);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            display: none;
        }

        .code-display {
            font-size: 36px;
            font-weight: 800;
            color: rgb(52, 211, 153);
            letter-spacing: 4px;
            font-family: monospace;
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .code-display:hover {
            transform: scale(1.03);
        }

        .status-text {
            font-size: 13px;
            color: var(--text-gray);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="tool-nav">
        <div class="nav-container">
            <a href="index.html" class="home-link">
                <i class="fa-solid fa-house"></i> Home
            </a>

            <div class="tool-links">
                <a href="mail-api.html" class="tool-btn"><i class="fa-solid fa-envelope"></i> API Mail</a>
                <a href="uid-checker.html" class="tool-btn"><i class="fa-solid fa-bolt"></i> UID Checker</a>
                <a href="index.html" class="tool-btn"><i class="fa-solid fa-ghost"></i> Ghost Monitor</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="tool-header">
                <i class="fa-solid fa-shield-halved"></i>
                <h1>2FA Authenticator</h1>
                <p>Generate high-security token codes instantly</p>
            </div>

            <div class="input-group">
                <label>🔑 Enter 2FA Secret Key</label>
                <input type="text" class="input-box" id="secretInput" placeholder="Paste your 2FA text or key here...">
            </div>

            <button class="btn-submit" onclick="generate2FACode()">⚡ Generate Code</button>

            <div class="result-box" id="resultBox">
                <div class="status-text">Your Verification Code (Click to Copy):</div>
                <div class="code-display" id="codeOutput" onclick="copyCode()">------</div>
                <div class="status-text" id="copyStatus">Ready</div>
            </div>
        </div>
    </div>

    <script>
        function generate2FACode() {
            const secret = document.getElementById('secretInput').value.trim();
            if (!secret) {
                alert('⚠️ Please enter a 2FA secret key!');
                return;
            }

            // Mock generation simulation (Replace with standard JS OTP library logic if needed)
            const resultBox = document.getElementById('resultBox');
            const codeOutput = document.getElementById('codeOutput');
            const copyStatus = document.getElementById('copyStatus');

            resultBox.style.display = 'block';
            codeOutput.innerText = 'FETCHING...';
            copyStatus.innerText = 'Calculating code...';

            setTimeout(() => {
                // Generates a random 6 digit code for layout test
                const mockCode = Math.floor(100000 + Math.random() * 900000);
                codeOutput.innerText = mockCode;
                copyStatus.innerText = '👉 Click the code above to copy!';
            }, 800);
        }

        function copyCode() {
            const code = document.getElementById('codeOutput').innerText;
            if (code === '------' || code === 'FETCHING...') return;

            navigator.clipboard.writeText(code).then(() => {
                const copyStatus = document.getElementById('copyStatus');
                copyStatus.style.color = 'rgb(52, 211, 153)';
                copyStatus.innerText = '✅ Code Copied Successfully!';
                setTimeout(() => {
                    copyStatus.style.color = 'rgb(156, 163, 175)';
                    copyStatus.innerText = '👉 Click the code above to copy!';
                }, 2000);
            });
        }
    </script>
</body>
</html>
