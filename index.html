<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FB OTP RETRIEVER - PRO</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { width: 500px; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 100px; background: #010409; color: #58a6ff; border: 1px solid #30363d; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .result-box { margin-top: 20px; padding: 15px; border: 2px dashed #58a6ff; text-align: center; }
        #otpDisplay { font-size: 30px; color: #39ff14; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align: center; color: #58a6ff;">Get FB Verification Code</h3>
    <textarea id="fullData" placeholder="Paste: Email|Password|Refresh_Token|Client_ID"></textarea>
    <button onclick="getOTP()">GET VERIFICATION CODE</button>

    <div class="result-box">
        <div>Detected Code:</div>
        <span id="otpDisplay">------</span>
    </div>
</div>

<script>
async function getOTP() {
    const input = document.getElementById('fullData').value.split('|');
    const display = document.getElementById('otpDisplay');
    
    if (input.length < 4) {
        alert("Please paste full data correctly!");
        return;
    }

    const email = input[0].trim();
    const refreshToken = input[2].trim();
    const clientId = input[3].trim();

    display.innerText = "Fetching Access Token...";

    try {
        // Step 1: Refresh Token থেকে নতুন Access Token নেওয়া
        const tokenRes = await fetch('https://login.microsoftonline.com/common/oauth2/v2.0/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                client_id: clientId,
                refresh_token: refreshToken,
                grant_type: 'refresh_token',
                scope: 'https://graph.microsoft.com/Mail.Read'
            })
        });

        const tokenData = await tokenRes.json();
        const accessToken = tokenData.access_token;

        if (!accessToken) throw new Error("Failed to get Access Token");

        display.innerText = "Searching Inbox...";

        // Step 2: Microsoft Graph API দিয়ে ইনবক্স থেকে ফেসবুকের মেইল খোঁজা
        const mailRes = await fetch(`https://graph.microsoft.com/v1.0/users/${email}/messages?$search="Facebook"&$top=1`, {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });

        const mailData = await mailRes.json();
        const latestMailBody = mailData.value[0].body.content;

        // Step 3: Regular Expression দিয়ে ৬ ডিজিটের কোড বের করা
        const codeMatch = latestMailBody.match(/\b\d{6}\b/);
        
        if (codeMatch) {
            display.innerText = codeMatch[0];
        } else {
            display.innerText = "Code Not Found!";
        }

    } catch (err) {
        console.error(err);
        display.innerText = "Error: Check Console";
    }
}
</script>

</body>
</html>
