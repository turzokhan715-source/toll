<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP - 100% Verified Checker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #05060f; color: #fff; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 850px; }
        .hidden { display: none !important; }

        /* --- HOME: Neon Glow Animation --- */
        .home-grid { display: flex; gap: 20px; justify-content: center; margin-top: 80px; flex-wrap: wrap; }
        .h-card { background: #0f111a; border: 2px solid #1e293b; padding: 35px; border-radius: 25px; text-align: center; width: 240px; cursor: pointer; transition: 0.4s; animation: neonPulse 2s infinite alternate; }
        @keyframes neonPulse { 
            from { border-color: #1e293b; box-shadow: 0 0 10px rgba(79, 70, 229, 0.2); } 
            to { border-color: #4f46e5; box-shadow: 0 0 30px rgba(79, 70, 229, 0.7); } 
        }
        .h-card:hover { transform: scale(1.05); background: #161a29; }
        .h-card span { font-size: 50px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 10px #4f46e5); }

        /* --- Tool UI --- */
        .card-inner { background: #ffffff; color: #1e293b; border-radius: 25px; padding: 25px; min-height: 520px; margin-top: 15px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        .back-btn { background: #4f46e5; color: #fff; border: none; padding: 10px 22px; border-radius: 12px; cursor: pointer; font-weight: 800; margin-bottom: 10px; }
        .top-nav { background: #0f111a; padding: 8px; border-radius: 50px; display: flex; justify-content: space-around; margin-bottom: 15px; }
        .tab-btn { background: transparent; color: #94a3b8; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: #fff; color: #05060f; box-shadow: 0 0 20px #fff; }
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 14px; outline: none; }
        .action-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #1e293b; color: #fff; font-weight: 800; cursor: pointer; margin: 20px 0; font-size: 16px; }
        .action-btn:hover { background: #4f46e5; }
        .console { background: #0b0e14; color: #22c55e; padding: 15px; border-radius: 15px; height: 250px; overflow-y: auto; font-family: 'Courier New', monospace; border: 1px solid #1e293b; }
        .die-line { color: #ef4444; }

        /* --- Stats Style --- */
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .stat-group { display: flex; gap: 10px; }
        .mini-stat { background: #f1f5f9; padding: 8px 15px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; min-width: 90px; }
        .mini-stat b { display: block; font-size: 18px; }
        .mini-stat span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .icon-btn { background: #f1f5f9; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; border: 1px solid #cbd5e1; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="p-home">
        <h1 style="text-align:center; font-size: 40px; margin-top: 60px;">Longisir VIP</h1>
        <p style="text-align:center; opacity:0.5; letter-spacing:5px; font-size:12px; margin-bottom: 50px;">PRO AUTOMATION HUB</p>
        <div class="home-grid">
            <div class="h-card" onclick="showTool('2fa')"><span>🔐</span><h3>2FA Auth</h3></div>
            <div class="h-card" onclick="showTool('mail')"><span>📧</span><h3>Mail Box</h3></div>
            <div class="h-card" onclick="showTool('live')"><span>✅</span><h3>Live Checker</h3></div>
        </div>
    </div>

    <div id="p-tools" class="hidden">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <div class="top-nav">
            <button class="tab-btn" id="t-2fa" onclick="tab('2fa')">2FA</button>
            <button class="tab-btn" id="t-mail" onclick="tab('mail')">MAIL</button>
            <button class="tab-btn" id="t-live" onclick="tab('live')">CHECKER</button>
        </div>
        
        <div class="card-inner">
            <div id="box-live" class="hidden">
                <textarea id="uids-input" class="input-box" rows="5" placeholder="UID|PASS|2FA (One per line)"></textarea>
                <button class="action-btn" id="start-btn" onclick="runChecker()">START VALIDATION</button>
                <div class="console" id="display-log">System Ready...</div>
                
                <div class="bottom-bar">
                    <div class="stat-group">
                        <div class="mini-stat" style="color:#22c55e;"><b id="lp">0%</b><span id="lc">0 Live</span></div>
                        <div class="mini-stat" style="color:#ef4444;"><b id="dp">0%</b><span id="dc">0 Die</span></div>
                        <div class="mini-stat" style="color:#4f46e5;"><b id="tt">0</b><span>Total</span></div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <div class="icon-btn" onclick="location.reload()">🗑️</div>
                        <div class="icon-btn" onclick="downloadCSV()">📥</div>
                    </div>
                </div>
            </div>

            <div id="box-2fa" class="hidden"><h2 style="text-align:center;margin-top:100px;">2FA Authenticator Coming Soon</h2></div>
            <div id="box-mail" class="hidden"><h2 style="text-align:center;margin-top:100px;">Mail API System Ready</h2></div>
        </div>
    </div>
</div>

<script>
    let liveRecords = [];

    function showTool(x) {
        document.getElementById('p-home').classList.add('hidden');
        document.getElementById('p-tools').classList.remove('hidden');
        tab(x);
    }

    function goHome() {
        document.getElementById('p-tools').classList.add('hidden');
        document.getElementById('p-home').classList.remove('hidden');
    }

    function tab(x) {
        ['2fa', 'mail', 'live'].forEach(id => {
            document.getElementById('box-' + id).classList.add('hidden');
            document.getElementById('t-' + id).classList.remove('active');
        });
        document.getElementById('box-' + x).classList.remove('hidden');
        document.getElementById('t-' + x).classList.add('active');
    }

    async function runChecker() {
        const input = document.getElementById('uids-input').value.trim();
        if (!input) return;
        const lines = input.split('\n').filter(l => l.trim() !== "");
        const log = document.getElementById('display-log');
        const btn = document.getElementById('start-btn');
        
        btn.disabled = true; btn.innerText = "CHECKING...";
        log.innerHTML = "Initializing Scan...<br>";
        let liveCount = 0, dieCount = 0; liveRecords = [];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            const uid = line.split(/[|:]/)[0].trim();

            try {
                // আপনার দেওয়া সেই কার্যকর মেথড
                const response = await fetch(`https://graph.facebook.com/${uid}/picture?type=normal`);
                
                if (response.ok && response.url.includes('100x100')) {
                    liveCount++;
                    liveRecords.push(line);
                    log.innerHTML += `<div>[${i+1}] ${uid} -> LIVE ✅</div>`;
                } else {
                    dieCount++;
                    log.innerHTML += `<div class="die-line">[${i+1}] ${uid} -> DIE ❌</div>`;
                }
            } catch (err) {
                dieCount++;
                log.innerHTML += `<div class="die-line">[${i+1}] ${uid} -> ERROR ⚠️</div>`;
            }

            // Stats Update
            const total = lines.length;
            document.getElementById('tt').innerText = total;
            document.getElementById('lc').innerText = liveCount + " Live";
            document.getElementById('dc').innerText = dieCount + " Die";
            document.getElementById('lp').innerText = Math.round((liveCount/total)*100) + "%";
            document.getElementById('dp').innerText = Math.round((dieCount/total)*100) + "%";
            log.scrollTop = log.scrollHeight;
        }
        btn.disabled = false; btn.innerText = "START VALIDATION";
    }

    function downloadCSV() {
        if (liveRecords.length === 0) return alert("No live IDs to save!");
        const blob = new Blob([liveRecords.join('\n')], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `Live_IDs_${Date.now()}.txt`;
        a.click();
    }
</script>

</body>
</html>
