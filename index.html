<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator - Longisir VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { 
            --primary: #a855f7; 
            --bg: #05060b; 
            --card-bg: #0f111a; 
            --text-gray: #94a3b8;
            --btn-grad: linear-gradient(135deg, #a855f7, #3b82f6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 800px; 
            width: 100%;
            margin-top: 20px;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 50px;
        }

        .back-btn {
            background: var(--btn-grad);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        /* --- TOOL CARD --- */
        .tool-card {
            background: #ffffff; /* আপনার আগের ডিজাইন অনুযায়ী সাদা ব্যাকগ্রাউন্ড */
            color: #000;
            padding: 50px 30px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tool-header {
            border-bottom: 1px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .tool-header h2 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
        }

        .input-box {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
        }

        .gen-btn {
            background: var(--btn-grad);
            color: #fff;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .gen-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        /* --- CODE DISPLAY --- */
        .code-box-wrapper { 
            background: #fff; 
            border: 3px solid var(--primary); 
            padding: 15px 40px; 
            border-radius: 20px; 
            display: inline-flex; 
            align-items: center; 
            gap: 20px; 
            margin-top: 40px;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.2);
        }

        .code-display { 
            font-size: 42px; 
            font-weight: 800; 
            color: #000; 
            letter-spacing: 5px; 
        }

        .copy-icon {
            font-size: 24px;
            color: var(--primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-icon:active {
            transform: scale(0.8);
        }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <nav class="nav-bar">
        <button class="back-btn" onclick="alert('Going Back to Home...')"><i class="fa-solid fa-arrow-left"></i> BACK TO HOME</button>
    </nav>

    <main class="tool-card">
        <div class="tool-header">
            <h2>2FA Authenticator</h2>
        </div>

        <input type="text" id="secret-key" class="input-box" placeholder="Enter Your 2FA Secret Key (e.g. JBSW...)">
        
        <button class="gen-btn" onclick="generate2FACode()">Generate 6-Digit Code</button>

        <center>
            <div class="code-box-wrapper">
                <span id="2fa-result" class="code-display">000000</span>
                <i class="fa-solid fa-copy copy-icon" onclick="copyCode()"></i>
            </div>
            <p style="margin-top: 15px; color: #64748b; font-weight: 600; font-size: 13px;">Click copy icon to copy the code</p>
        </center>
    </main>
</div>

<script>
    function generate2FACode() {
        const key = document.getElementById('secret-key').value.trim();
        if(!key) {
            alert("Please enter a Secret Key first!");
            return;
        }

        // এখানে আমরা একটি র‍্যান্ডম কোড জেনারেট করছি ডেমো হিসেবে
        // প্রফেশনাল ব্যবহারের জন্য এখানে 'otplib' বা এই জাতীয় লাইব্রেরি লাগে
        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('2fa-result').innerText = code;
        
        // অটো কপি করার সুবিধা
        navigator.clipboard.writeText(code);
    }

    function copyCode() {
        const code = document.getElementById('2fa-result').innerText;
        if(code === "000000") return;
        
        navigator.clipboard.writeText(code);
        alert("Code Copied: " + code);
    }
</script>

</body>
</html>
