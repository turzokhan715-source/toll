<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Live Checker Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .tool-container { 
            width: 900px; 
            height: 600px; 
            background: #151515; 
            display: flex; 
            border: 1px solid #333333; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* বাম পাশের ইনপুট প্যানেল */
        .input-panel { 
            width: 300px; 
            background: #1a1a1a; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #333333; 
        }
        .header-title { background: #0088ff; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .token-field { background: #222; border: 1px solid #444; padding: 8px; border-radius: 4px; color: #00ff00; font-size: 12px; margin-bottom: 10px; outline: none; }
        .uid-area { flex: 1; background: #222; border: 1px solid #444; border-radius: 4px; padding: 10px; color: #ffffff; font-family: monospace; font-size: 12px; overflow-y: auto; outline: none; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-clear { background: #ff4444; color: white; }
        .btn-check { background: #0088ff; color: white; }

        /* ডান পাশের রেজাল্ট প্যানেল */
        .result-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #0a0a0a; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #aaa; }
        .result-box { flex: 1; background: #151515; border: 1px solid #333; border-radius: 6px; padding: 10px; overflow-y: auto; }
        .result-item { display: flex; justify-content: space-between; padding: 8px; margin-bottom: 5px; border-radius: 4px; font-family: monospace; }
        .active-row { background: rgba(0, 255, 0, 0.1); border-left: 4px solid #00ff00; color: #00ff00; }
        .dead-row { background: rgba(255, 0, 0, 0.1); border-left: 4px solid #ff4444; color: #ff4444; }

        /* ফুটার প্রগ্রেস বার */
        .footer { margin-top: 15px; display: flex; align-items: center; gap: 15px; }
        .progress-container { flex: 1; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #0088ff; transition: 0.3s; }
        .export-btn { background: transparent; border: 1px solid #0088ff; color: #0088ff; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="input-panel">
        <div class="header-title">FB LIVE CHECKER</div>
        <input type="text" id="token" class="token-field" placeholder="Access Token (Optional)">
        <div id="uid-input" class="uid-area" contenteditable="true" data-placeholder="Paste UIDs here..."></div>
        <div class="btn-group">
            <button class="btn btn-clear" onclick="location.reload()">Clear</button>
            <button class="btn btn-check" onclick="startCheck()">Start Check</button>
        </div>
    </div>

    <div class="result-panel">
        <div class="stats-bar">
            <span>Progress: <span id="percent">0%</span></span>
            <span>Live: <span id="live-count" style="color:#00ff00">0</span> | Dead: <span id="dead-count" style="color:#ff4444">0</span></span>
        </div>
        <div class="result-box" id="results">
            <div style="color:#555; text-align:center; padding-top:50px;">Check results will appear here...</div>
        </div>
        <div class="footer">
            <div class="progress-container"><div id="progress" class="progress-fill"></div></div>
            <button class="export-btn">Export</button>
        </div>
    </div>
</div>

<script>
    function startCheck() {
        const inputDiv = document.getElementById('uid-input');
        const list = inputDiv.innerText.split('\n').filter(i => i.trim() !== "");
        if(list.length === 0) return alert("Please paste some UIDs!");

        document.getElementById('results').innerHTML = "";
        let live = 0, dead = 0, index = 0;

        function process() {
            if(index >= list.length) return;

            let uid = list[index].trim();
            let isLive = Math.random() > 0.5; // ডেমো রেজাল্ট, এখানে আপনার API লজিক বসবে

            let div = document.createElement('div');
            div.className = 'result-item ' + (isLive ? 'active-row' : 'dead-row');
            div.innerHTML = `<span>${uid}</span> <span>${isLive ? 'LIVE' : 'DEAD'}</span>`;
            document.getElementById('results').appendChild(div);
            document.getElementById('results').scrollTop = document.getElementById('results').scrollHeight;

            if(isLive) live++; else dead++;
            document.getElementById('live-count').innerText = live;
            document.getElementById('dead-count').innerText = dead;

            index++;
            let p = (index / list.length) * 100;
            document.getElementById('progress').style.width = p + '%';
            document.getElementById('percent').innerText = Math.round(p) + '%';

            setTimeout(process, 200);
        }
        process();
    }
</script>

</body>
</html>
