<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FB OTP DETECTOR - BROWSER VERSION</title>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { width: 550px; background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: #010409; color: #39ff14; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-family: monospace; box-sizing: border-box; resize: none; outline: none; }
        button { width: 100%; padding: 14px; background: #238636; color: white; border: none; border-radius: 6px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2ea043; }
        .result-area { margin-top: 25px; padding: 20px; border: 2px dashed #30363d; border-radius: 8px; text-align: center; }
        #status { font-size: 14px; color: #8b949e; margin-bottom: 10px; }
        #otpDisplay { font-size: 42px; color: #58a6ff; font-weight: bold; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Get FB Verification Code</h2>
    <textarea id="tokenData" placeholder="Email|Password|Refresh_Token|Client_ID"></textarea>
    <button onclick="fetchCode()">GET VERIFICATION CODE</button>

    <div class="result-area">
        <div id="status">Waiting for input...</div>
        <div id="otpDisplay">------</div>
    </div>
</div>

<script>
async function fetchCode() {
    const input = document.getElementById('tokenData').value.trim();
    const status = document.getElementById('status');
    const display = document.getElementById('otpDisplay');

    if (!input.includes('|')) {
        alert("Invalid Format! Use: Email|Pass|Refresh_Token|Client_ID");
        return;
    }

    const parts = input.split('|');
    const email = parts[0].trim();
    const refreshToken = parts[2].trim();
    const clientId = parts[3].trim();

    // CORS সমস্যা সমাধানের জন্য পাবলিক প্রক্সি ব্যবহার করা হয়েছে
    const proxy = "https://api.allorigins.win/raw?url=";

    try {
        status.innerText = "Refreshing Access Token...";
        
        // ১. এক্সেস টোকেন নেওয়া
        const tokenUrl = "https://login.microsoftonline.com/common/oauth2/v2.0/token";
        const body = new URLSearchParams({
            client_id: clientId,
            refresh_token: refreshToken,
            grant_type: 'refresh_token',
            scope: 'https://graph.microsoft.com/Mail.Read'
        });

        const tokenRes = await fetch(proxy + encodeURIComponent(tokenUrl), {
            method: 'POST',
            body: body
        });
        const tokenJson = await tokenRes.json();
        const accessToken = tokenJson.access_token;

        if (!accessToken) throw new Error("Token Refresh Failed");

        status.innerText = "Scanning Inbox for Facebook Mail...";

        // ২. মাইক্রোসফট গ্রাফ এপিআই দিয়ে মেইল চেক করা
        const mailUrl = `https://graph.microsoft.com/v1.0/users/${email}/messages?$search="Facebook"&$top=1`;
        const mailRes = await fetch(proxy + encodeURIComponent(mailUrl), {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const mailJson = await mailRes.json();

        if (mailJson.value && mailJson.value.length > 0) {
            const content = mailJson.value[0].body.content;
            // ৩. ৬ ডিজিটের কোড খুজে বের করা
            const codeMatch = content.match(/\b\d{5,6}\b/);
            
            if (codeMatch) {
                status.innerText = "Verification Code Detected!";
                display.innerText = codeMatch[0];
            } else {
                status.innerText = "Mail found, but no code detected.";
                display.innerText = "NOT FOUND";
            }
        } else {
            status.innerText = "No Facebook mail found in inbox.";
            display.innerText = "EMPTY";
        }

    } catch (err) {
        console.error(err);
        status.innerText = "Error: Token might be expired or invalid.";
        display.innerText = "ERROR";
    }
}
</script>

</body>
</html>
