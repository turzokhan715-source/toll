<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Longisir - Real OTP Extractor</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #050505;
            --card: #111111;
        }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 500px;
            border: 1px solid #333;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 10px;
            color: #0f0;
            padding: 10px;
            margin: 15px 0;
            font-family: monospace;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .res-display {
            margin-top: 20px;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed var(--primary);
        }
        #otp-show {
            font-size: 40px;
            color: #0f0;
            font-weight: 800;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📧 OTP Extractor</h2>
    <p style="color: #888; font-size: 13px;">Paste your Mail/Inbox text below</p>
    
    <textarea id="mailData" placeholder="মেইল থেকে পুরো টেক্সট কপি করে এখানে পেস্ট করুন..."></textarea>
    
    <button class="btn" onclick="extractRealOTP()">EXTRACT CODE</button>

    <div class="res-display">
        <div id="otp-show">------</div>
        <p id="msg" style="color: #555; font-size: 12px; margin-top: 10px;">Waiting for data...</p>
    </div>
</div>

<script>
    function extractRealOTP() {
        const text = document.getElementById('mailData').value;
        const display = document.getElementById('otp-show');
        const msg = document.getElementById('msg');

        // এই Regex টি ৫ থেকে ৮ ডিজিটের যেকোনো কোড খুঁজে বের করবে
        // এটি মেইলে থাকা Facebook বা Instagram কোড ধরার জন্য সবচেয়ে কার্যকর
        const otpMatch = text.match(/\b\d{5,8}\b/);

        if (otpMatch) {
            const code = otpMatch[0];
            display.innerText = code;
            msg.innerText = "✅ REAL CODE FOUND!";
            msg.style.color = "#0f0";
            
            // অটো কপি করার সুবিধা
            navigator.clipboard.writeText(code);
        } else {
            display.innerText = "NOT FOUND";
            msg.innerText = "❌ No code detected in the text.";
            msg.style.color = "#f44";
        }
    }
</script>

</body>
</html>
