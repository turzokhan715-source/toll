<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB UID LIVE CHECKER - PROFESSIONAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .checker-container { width: 100%; max-width: 750px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; }

        /* Input Section */
        .input-group { margin-bottom: 20px; }
        textarea { width: 100%; height: 160px; background: #010409; color: #39ff14; border: 1px solid #30363d; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 14px; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #58a6ff; box-shadow: 0 0 8px rgba(88, 166, 255, 0.3); }

        /* Controls & Buttons */
        .control-panel { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-start { background: #238636; color: white; }
        .btn-start:hover { background: #2ea043; }
        .btn-clear { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-clear:hover { background: #30363d; }

        /* Stats Bar */
        .status-bar { display: flex; justify-content: space-between; background: #010409; padding: 12px 20px; border-radius: 6px; border: 1px solid #30363d; font-size: 14px; margin-bottom: 15px; }
        .stat-item span { font-weight: bold; }
        
        /* Progress Indicator */
        .progress-wrapper { width: 100%; background: #21262d; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; display: none; }
        .progress-fill { height: 100%; width: 0%; background: #58a6ff; transition: width 0.2s; }

        /* Results Box */
        .results-wrapper { background: #010409; border: 1px solid #30363d; border-radius: 8px; max-height: 250px; overflow-y: auto; padding: 10px; }
        .result-row { padding: 8px 15px; border-radius: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; font-family: monospace; font-size: 13px; border-left: 4px solid #333; }
        .row-live { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border-left-color: #2ecc71; }
        .row-dead { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border-left-color: #e74c3c; }
        .row-error { background: rgba(241, 196, 15, 0.1); color: #f1c40f; border-left-color: #f1c40f; }
        
        .no-data { text-align: center; color: #8b949e; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="checker-container">
    <h2>FB UID LIVE CHECKER</h2>
    
    <div class="input-group">
        <textarea id="uidList" placeholder="এখানে আপনার ফেসবুক UID গুলো পেস্ট করুন (প্রতি লাইনে একটি)..."></textarea>
    </div>

    <div class="control-panel">
        <button class="btn btn-clear" onclick="resetTracker()">Clear All</button>
        <button class="btn btn-start" id="actionBtn" onclick="processUIDs()">Start Checking</button>
    </div>

    <div class="status-bar">
        <div class="stat-item">Progress: <span id="progressPercent" style="color: #58a6ff;">0%</span></div>
        <div class="stat-item">Live: <span id="liveCount" style="color: #2ecc71;">0</span></div>
        <div class="stat-item">Dead: <span id="deadCount" style="color: #e74c3c;">0</span></div>
    </div>

    <div class="progress-wrapper" id="progressArea">
        <div class="progress-fill" id="progressBar"></div>
    </div>

    <div class="results-wrapper" id="resultsContainer">
        <div class="no-data" id="placeholderText">রেজাল্ট এখানে দেখতে পাবেন...</div>
    </div>
</div>

<script>
    // আপনার দেওয়া কোর ফাংশন (কাজের লজিক)
    async function checkFacebookUID(uid) {
        try {
            const response = await fetch(`https://graph.facebook.com/${uid}/picture?type=normal`);
            if (response.ok && response.url.includes('100x100')) {
                return "LIVE ✅";
            } else {
                return "DEAD ❌";
            }
        } catch (error) {
            return "ERROR ⚠️";
        }
    }

    // পুরো চেকিং প্রসেস কন্ট্রোল করার ফাংশন
    async function processUIDs() {
        const inputField = document.getElementById('uidList');
        const container = document.getElementById('resultsContainer');
        const placeholder = document.getElementById('placeholderText');
        const progressArea = document.getElementById('progressArea');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const liveCountDisplay = document.getElementById('liveCount');
        const deadCountDisplay = document.getElementById('deadCount');
        const actionBtn = document.getElementById('actionBtn');

        const uids = inputField.value.split('\n').map(id => id.trim()).filter(id => id.length > 0);
        
        if (uids.length === 0) {
            alert("অনুগ্রহ করে অন্তত একটি UID ইনপুট দিন!");
            return;
        }

        // রিসেট এবং ইনিশিয়ালাইজেশন
        if (placeholder) placeholder.remove();
        container.innerHTML = '';
        progressArea.style.display = 'block';
        actionBtn.disabled = true;
        actionBtn.style.opacity = '0.6';
        actionBtn.innerText = "Checking...";

        let liveCount = 0;
        let deadCount = 0;

        for (let i = 0; i < uids.length; i++) {
            const currentUID = uids[i];
            const result = await checkFacebookUID(currentUID);

            // নতুন রেজাল্ট রো (Row) তৈরি
            const row = document.createElement('div');
            row.className = 'result-row';

            if (result === "LIVE ✅") {
                row.classList.add('row-live');
                liveCount++;
            } else if (result === "DEAD ❌") {
                row.classList.add('row-dead');
                deadCount++;
            } else {
                row.classList.add('row-error');
            }

            row.innerHTML = `<span>ID: ${currentUID}</span> <span>${result}</span>`;
            container.appendChild(row);
            
            // অটো স্ক্রল ডাউন
            container.scrollTop = container.scrollHeight;

            // কাউন্টার এবং প্রগ্রেস বার আপডেট
            liveCountDisplay.innerText = liveCount;
            deadCountDisplay.innerText = deadCount;
            
            const percent = Math.round(((i + 1) / uids.length) * 100);
            progressBar.style.width = `${percent}%`;
            progressPercent.innerText = `${percent}%`;
        }

        // কাজ শেষ হওয়ার পর বাটন সচল করা
        actionBtn.disabled = false;
        actionBtn.style.opacity = '1';
        actionBtn.innerText = "Start Checking";
    }

    // ক্লিয়ার অল ফাংশন
    function resetTracker() {
        document.getElementById('uidList').value = '';
        document.getElementById('liveCount').innerText = '0';
        document.getElementById('deadCount').innerText = '0';
        document.getElementById('progressPercent').innerText = '0%';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressArea').style.display = 'none';
        document.getElementById('resultsContainer').innerHTML = '<div class="no-data" id="placeholderText">রেজাল্ট এখানে দেখতে পাবেন...</div>';
    }
</script>

</body>
</html>
