<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator - Longisir VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { 
            --primary: #a855f7; 
            --bg: #05060b; 
            --card-bg: #ffffff; 
            --text-gray: #94a3b8;
            --btn-grad: linear-gradient(135deg, #a855f7, #3b82f6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #000; 
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            max-width: 800px; 
            width: 100%;
        }

        /* --- TOOL CARD --- */
        .tool-card {
            background: var(--card-bg);
            padding: 50px 30px;
            border-radius: 45px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tool-header h2 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 35px;
        }

        /* Input Box style */
        .input-box {
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
            color: #1e293b;
        }

        /* Generate Button */
        .gen-btn {
            background: var(--btn-grad);
            color: #fff;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3);
            margin-bottom: 40px;
        }

        /* Lighting Code Box */
        .code-box-wrapper { 
            background: #fff; 
            border: 3px solid var(--primary); 
            padding: 20px 50px; 
            border-radius: 25px; 
            display: inline-flex; 
            align-items: center; 
            gap: 20px; 
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); /* Lighting Effect */
            position: relative;
        }

        .code-display { 
            font-size: 45px; 
            font-weight: 800; 
            color: #000; 
            letter-spacing: 5px; 
        }

        .copy-icon {
            font-size: 26px;
            color: var(--primary);
            cursor: pointer;
        }

        .auto-copy-label {
            margin-top: 12px;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 14px;
        }

        /* --- HISTORY BOX --- */
        .history-section {
            margin-top: 40px;
            text-align: left;
            border-top: 2px dashed #f1f5f9;
            padding-top: 25px;
        }

        .history-section h3 {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 15px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 20px;
            padding: 15px;
        }

        .history-item {
            background: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 13px;
            border-left: 4px solid var(--primary);
            word-break: break-all; /* Key যেন ফুল দেখা যায় */
            color: #475569;
        }

        .history-item b { color: #000; margin-right: 10px; }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <main class="tool-card">
        <div class="tool-header">
            <h2>2FA Authenticator</h2>
        </div>

        <!-- Input Box -->
        <input type="text" id="secret-key" class="input-box" placeholder="Enter Your 2FA Secret Key">
        
        <!-- Generate Button -->
        <button class="gen-btn" onclick="generateAndSave()">Generate 6-Digit Code</button>

        <center>
            <!-- Code Box with Lighting -->
            <div class="code-box-wrapper">
                <span id="2fa-result" class="code-display">(CODE)</span>
                <i class="fa-solid fa-copy copy-icon" onclick="copyManual()"></i>
            </div>
            <p class="auto-copy-label">Auto code generated & copied!</p>
        </center>

        <!-- History Section -->
        <div class="history-section">
            <h3>Historey</h3>
            <div id="history-container" class="history-list">
                <p style="color: #94a3b8; font-size: 13px; text-align: center;">No history yet</p>
            </div>
        </div>
    </main>
</div>

<script>
    function generateAndSave() {
        const keyInput = document.getElementById('secret-key');
        const key = keyInput.value.trim();
        
        if(!key) {
            alert("Please enter a Secret Key first!");
            return;
        }

        // Code Generation (Demo)
        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('2fa-result').innerText = code;
        
        // 1. Auto Copy
        navigator.clipboard.writeText(code.toString());

        // 2. Add to History (Key Full দেখাবে)
        addToHistory(key, code);

        // 3. Clear Input
        keyInput.value = "";
    }

    function addToHistory(key, code) {
        const container = document.getElementById('history-container');
        
        // "No history yet" লেখাটি সরিয়ে ফেলা
        if(container.innerHTML.includes("No history yet")) {
            container.innerHTML = "";
        }

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<b>CODE: ${code}</b> | KEY: ${key}`;
        
        // নতুন হিস্ট্রি সবার উপরে দেখাবে
        container.insertBefore(item, container.firstChild);
    }

    function copyManual() {
        const code = document.getElementById('2fa-result').innerText;
        if(code === "(CODE)") return;
        navigator.clipboard.writeText(code);
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
