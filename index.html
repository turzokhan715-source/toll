<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bulk UID Checker Panel</title>
    <style>
        /* প্রফেশনাল ডার্ক থিম গ্লোবাল স্টাইল */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19; /* রিচ ডার্ক ব্যাকগ্রাউন্ড */
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* শীর্ষ নেভিগেশন বার - প্রফেশনাল লুক */
        .top-navbar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn-home {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            font-size: 14px;
        }

        .nav-right {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.07);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* মূল প্যানেল কন্টেইনার (গ্লসি ডার্ক কার্ড) */
        .main-panel {
            width: 100%;
            max-width: 800px;
            background: #111827; /* সাইবার ডার্ক প্যানেল */
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
            color: #818cf8; /* নিয়ন পার্পল টাইটেল */
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* ইনপুট বক্স - নোম্যাল সাইজ ও স্ক্রল ফ্রেন্ডলি */
        .input-area-wrapper {
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #f3f4f6;
            outline: none;
            resize: vertical; /* ইউজার চাইলে টেনে বড় করতে পারবে */
            font-weight: 500;
            line-height: 1.5;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        textarea:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* অ্যাকশন বাটন গ্রুপ */
        .action-row {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }

        .btn-start {
            flex: 1;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: opacity 0.2s;
        }

        .btn-start:active { opacity: 0.9; }

        .btn-clear {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        /* ব্ল্যাক কনসোল বক্স - স্ক্রল ফ্রেন্ডলি */
        .console-box {
            width: 100%;
            height: 260px;
            background: #030712;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: #34d399; /* গ্লোয়িং গ্রিন */
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #1f2937;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.6);
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
        }

        .console-log { margin-bottom: 4px; word-break: break-all; }
        .log-live { color: #34d399; font-weight: 600; }
        .log-die { color: #f87171; }

        /* ফুটারে থাকা কাউন্টার এবং ডাউনলোড বাটন */
        .footer-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        /* ল্যাপটপ বা বড় স্ক্রিনের জন্য সাইড-বাই-সাইড ভিউ */
        @media (min-width: 600px) {
            .footer-row {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .stats-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .stats-group { width: auto; }
        }

        .stat-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 10px 15px;
            text-align: center;
            flex: 1;
            min-width: 85px;
        }

        .stat-num {
            font-size: 15px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: #9ca3af;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-color { color: #e5e7eb; }
        .live-color { color: #34d399; }
        .die-color { color: #f87171; }

        .btn-download {
            width: 100%;
            background: #059669; /* প্রিমিয়াম গ্রিন */
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.4);
            transition: background 0.2s;
            text-align: center;
            text-transform: uppercase;
        }

        @media (min-width: 600px) {
            .btn-download { width: auto; }
        }

        .btn-download:hover { background: #047857; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="nav-left">
            <button class="nav-btn-home">🏠 HOME</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn">2FA</button>
            <button class="nav-btn">MAIL</button>
            <button class="nav-btn">CHECKER</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="panel-title">Bulk UID Checker Pro</div>
        
        <div class="input-area-wrapper">
            <textarea id="inputData" placeholder="Paste data here... (Supports UID|PASS|2FA or Space/Tab separated formats)"></textarea>
        </div>

        <div class="action-row">
            <button class="btn-start" id="startBtn" onclick="startScanner()">Start Scanner</button>
            <button class="btn-clear" onclick="clearTool()">Clear</button>
        </div>

        <div class="console-box" id="consoleScreen">Console ready...</div>

        <div class="footer-row">
            <div class="stats-group">
                <div class="stat-card">
                    <span class="stat-num total-color" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num live-color" id="livePercent">0% LIVE</span>
                    <span class="stat-label">Live</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num die-color" id="diePercent">0% DIE</span>
                    <span class="stat-label">Die</span>
                </div>
            </div>
            
            <button class="btn-download" onclick="downloadLiveCSV()">Download Live Accounts</button>
        </div>
    </div>

<script>
    let liveAccounts = []; 
    const CONCURRENCY_LIMIT = 5; // একসাথে ৫টি আইডি প্যারালাল চেক হবে

    // ফেসবুক ইউআইডি লাইভ চেক করার মূল মেথড
    async function checkFacebookUID(uid) {
        try {
            const cleanUID = uid.trim().replace(/[^a-zA-Z0-9.]/g, "");
            if(!cleanUID) return "DEAD ❌";
            
            const response = await fetch(`https://graph.facebook.com/${cleanUID}/picture?type=normal&_ts=${Date.now()}`);
            if (response.ok && response.url.includes('100x100')) {
                return "LIVE ✅";
            } else {
                return "DEAD ❌";
            }
        } catch (error) {
            return "ERROR ⚠️";
        }
    }

    // স্ক্যান ইঞ্জিন ফাংশন
    async function startScanner() {
        const inputStr = document.getElementById('inputData').value.trim();
        const consoleScreen = document.getElementById('consoleScreen');
        const startBtn = document.getElementById('startBtn');
        
        if (!inputStr) {
            alert("Please paste your UID data first!");
            return;
        }

        const lines = inputStr.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        
        consoleScreen.innerHTML = "Initializing fast multi-threaded engine...<br>";
        liveAccounts = [];
        let total = lines.length;
        let live = 0;
        let die = 0;

        document.getElementById('totalCount').innerText = total;
        startBtn.disabled = true;
        startBtn.innerText = "Scanning Fast...";

        function updateStats() {
            const livePct = total > 0 ? Math.round((live / total) * 100) : 0;
            const diePct = total > 0 ? Math.round((die / total) * 100) : 0;
            document.getElementById('livePercent').innerText = `${livePct}% LIVE`;
            document.getElementById('diePercent').innerText = `${diePct}% DIE`;
        }

        const queue = [...lines];
        
        async function worker() {
            while (queue.length > 0) {
                const currentLine = queue.shift();
                if (!currentLine) continue;

                let parts = [];
                if (currentLine.includes('|')) {
                    parts = currentLine.split('|');
                } else {
                    parts = currentLine.split(/\s+/); 
                }

                const uid = parts[0] ? parts[0].trim() : '';
                const pass = parts[1] ? parts[1].trim() : '';
                const twoFA = parts[2] ? parts[2].trim() : '';

                if (!uid) continue;

                const result = await checkFacebookUID(uid);
                const logLine = document.createElement('div');
                logLine.className = 'console-log';

                if (result === "LIVE ✅") {
                    logLine.className += ' log-live';
                    logLine.innerText = `[LIVE] ID: ${uid}`;
                    live++;
                    // সম্পূর্ণ ডেটা অবজেক্টে পুশ করা হচ্ছে
                    liveAccounts.push({ uid, pass, twoFA });
                } else {
                    logLine.className += ' log-die';
                    logLine.innerText = `[DIE] ID: ${uid}`;
                    die++;
                }

                consoleScreen.appendChild(logLine);
                consoleScreen.scrollTop = consoleScreen.scrollHeight; 
                updateStats();
            }
        }

        const workers = [];
        const activeThreads = Math.min(CONCURRENCY_LIMIT, queue.length);
        
        for (let i = 0; i < activeThreads; i++) {
            workers.push(worker());
        }

        await Promise.all(workers);

        const finalLog = document.createElement('div');
        finalLog.style.color = '#818cf8';
        finalLog.style.paddingTop = '10px';
        finalLog.style.fontWeight = 'bold';
        finalLog.innerText = `⚡ Completed! Total Live: ${live}, Total Die: ${die}`;
        consoleScreen.appendChild(finalLog);
        consoleScreen.scrollTop = consoleScreen.scrollHeight;
        
        startBtn.disabled = false;
        startBtn.innerText = "Start Scanner";
    }

    // [FIXED 100% 2FA] স্পেশাল ক্যারেক্টার প্রোটেক্টেড এক্সেল/গুগল শিট ডাউনলোডার
    function downloadLiveCSV() {
        if (liveAccounts.length === 0) {
            alert("No live accounts found to download!");
            return;
        }

        let csvRows = ["UID,PASSWORD,2FA"];

        liveAccounts.forEach(account => {
            csvRows.push(`"${account.uid}","${account.pass}","${account.twoFA}"`);
        });

        const csvString = csvRows.join("\n");
        
        // UTF-8 BOM অ্যাড করা হলো যাতে প্লাস (+), ইকুয়াল (=) বা স্ল্যাশ (/) কেটে না যায়
        const contentWithBOM = "\ufeff" + csvString;
        
        // অবজেক্ট ব্লব মেথড (এটি ফোনের ব্রাউজারেও ১০০% কাজ করে এবং ডাটা মিস হয় না)
        const blob = new Blob([contentWithBOM], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "live_accounts.csv");
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // মেমোরি রিলিজ করা
        setTimeout(() => URL.revokeObjectURL(url), 100);
    }

    // রিসেট বাটন ফাংশন
    function clearTool() {
        document.getElementById('inputData').value = '';
        document.getElementById('consoleScreen').innerHTML = 'Console ready...';
        document.getElementById('totalCount').innerText = '0';
        document.getElementById('livePercent').innerText = '0% LIVE';
        document.getElementById('diePercent').innerText = '0% DIE';
        liveAccounts = [];
    }
</script>

</body>
</html>
