<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bulk UID Checker Panel</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড ও বডি স্টাইল */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #090b0e; /* ডিপ ব্ল্যাক-ব্লু ডার্ক ব্যাকগ্রাউন্ড */
            color: #333;
            min-height: 100vh;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* শীর্ষ নেভিগেশন বার (Top Header) */
        .top-navbar {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .nav-left .nav-btn-home {
            background: #6366f1; /* পার্পল-ব্লু গ্লোয়িং বাটন */
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-right {
            display: flex;
            gap: 12px;
        }

        .nav-right .nav-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
            transition: 0.3s;
        }

        .nav-right .nav-btn:hover {
            background: #6366f1;
        }

        /* মূল প্যানেল কার্ড (Main White Container) */
        .main-panel {
            width: 100%;
            max-width: 1100px;
            background: #ffffff; /* স্ক্রিনশটের মতো গ্লসি হোয়াইট ব্যাকগ্রাউন্ড */
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
            color: #8b5cf6; /* ভাইব্রেন্ট পার্পল টাইটেল */
            margin-bottom: 25px;
        }

        /* ইনপুট বক্স (Textarea) */
        .input-area-wrapper {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 140px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #475569;
            outline: none;
            resize: none;
            font-weight: 500;
        }

        /* অ্যাকশন বাটন গ্রুপ (Start Scanner & Clear) */
        .action-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-start {
            flex: 1;
            background: linear-gradient(90deg, #6366f1, #3b82f6); /* আকর্ষণীয় গ্রাডিয়েন্ট বাটন */
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-clear {
            background: #ef4444; /* রেড ক্লিয়ার বাটন */
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* ডার্ক কনসোল বক্স (The Black Screen) */
        .console-box {
            width: 100%;
            height: 300px;
            background: #090d16; /* একদম নিখুঁত ডার্ক কনসোল ব্যাকগ্রাউন্ড */
            border-radius: 16px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #10b981; /* নিয়ন গ্রিন রেডি টেক্সট */
            overflow-y: auto;
            margin-bottom: 25px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
        }

        /* ফুটারে থাকা কাউন্টার এবং ডাউনলোড বাটন */
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stats-group {
            display: flex;
            gap: 12px;
        }

        .stat-card {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 20px;
            text-align: center;
            min-width: 85px;
        }

        .stat-num {
            font-size: 15px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* কাউন্টার স্পেসিফিক কালার */
        .total-color { color: #334155; }
        .live-color { color: #10b981; }
        .die-color { color: #ef4444; }

        .btn-download {
            background: #10b981; /* উজ্জ্বল সবুজ ডাউনলোড বাটন */
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: 0.2s;
        }

        .btn-download:hover {
            background: #059669;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="nav-left">
            <button class="nav-btn-home">🏠 HOME</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn">2FA</button>
            <button class="nav-btn">MAIL</button>
            <button class="nav-btn">CHECKER</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="panel-title">Bulk UID Checker</div>
        
        <div class="input-area-wrapper">
            <textarea placeholder="UID|PASS|2FA"></textarea>
        </div>

        <div class="action-row">
            <button class="btn-start">Start Scanner</button>
            <button class="btn-clear">Clear</button>
        </div>

        <div class="console-box">
            Console ready...
        </div>

        <div class="footer-row">
            <div class="stats-group">
                <div class="stat-card">
                    <span class="stat-num total-color">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num live-color">0% LIVE</span>
                    <span class="stat-label">Live</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num die-color">0% DIE</span>
                    <span class="stat-label">Die</span>
                </div>
            </div>
            
            <button class="btn-download">DOWNLOAD LIVE</button>
        </div>
    </div>

</body>
</html>
