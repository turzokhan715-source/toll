<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Portal - Premium Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --secondary: #ec4899;
            --bg: #050505;
            --card-bg: #111111;
            --text-gray: #9ca3af;
            --glow: 0 0 30px rgba(139, 92, 246, 0.4);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            height: 650px;
            box-shadow: var(--glow);
            overflow: hidden;
        }

        /* Sidebar Style */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-gray);
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        /* Main Content Style */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea, input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus, input:focus {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.05);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .result-box {
            margin-top: 30px;
            background: #000;
            border-radius: 15px;
            padding: 20px;
            min-height: 150px;
            border: 1px dashed rgba(139, 92, 246, 0.3);
        }

        .status-active { color: #22c55e; font-weight: bold; }
        .status-blocked { color: #ef4444; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo">LONGISIR PORTAL</div>
        <div class="nav-item active"><i class="fas fa-shield-check"></i> Live Checker</div>
        <div class="nav-item"><i class="fas fa-key"></i> 2FA Auth</div>
        <div class="nav-item"><i class="fas fa-envelope"></i> Mail API</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Account Live Checker</h1>
            <p style="color: var(--text-gray);">Check your UIDs status in real-time</p>
        </div>

        <div class="input-group">
            <label>Paste UIDs (One per line)</label>
            <textarea id="uidInput" rows="8" placeholder="Enter UIDs here..."></textarea>
        </div>

        <button class="btn-primary" onclick="startCheck()">Start Checking</button>

        <div class="result-box" id="resultContainer">
            <p style="color: #444; text-align: center; margin-top: 40px;">Results will appear here...</p>
        </div>
    </div>
</div>

<script>
    function startCheck() {
        const input = document.getElementById('uidInput').value;
        const container = document.getElementById('resultContainer');
        
        if(!input.trim()) {
            alert("Please enter some UIDs!");
            return;
        }

        container.innerHTML = '<p style="color: #8b5cf6;">Checking... Please wait.</p>';
        
        const uids = input.split('\n');
        let html = '';

        setTimeout(() => {
            uids.forEach((uid, index) => {
                if(uid.trim()) {
                    const isLive = Math.random() > 0.4;
                    html += `<div style="margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px;">
                        [${index + 1}] ID: ${uid.trim()} —> 
                        <span class="${isLive ? 'status-active' : 'status-blocked'}">
                            ${isLive ? 'ACTIVE ✅' : 'BLOCKED ❌'}
                        </span>
                    </div>`;
                }
            });
            container.innerHTML = html;
        }, 1500);
    }
</script>

</body>
</html>
